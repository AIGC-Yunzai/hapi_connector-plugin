# HAPI Connector for Yunzai

# HAPI 服务地址，例如 http://127.0.0.1:3006
hapi_endpoint: ""

# HAPI Access Token，支持 token:namespace 格式；修改后重启生效
access_token: ""

# 代理地址，支持 http:// 与 https:// 代理；SOCKS 代理需额外依赖，当前会忽略
proxy_url: ""

# Cloudflare Zero Trust Access Service Token，可留空
cf_access_client_id: ""
cf_access_client_secret: ""

# JWT 缓存策略，需与 HAPI 后端保持一致或略短
jwt_lifetime: 900
refresh_before_expiry: 180

# SSE 推送级别：silence / simple / summary / detail
output_level: "simple"
summary_msg_count: 5

# 推送 AI 回复的输出方式：text 仅文字 / image 仅图片 / both 图片+文字
markdown_output: "text"

# 是否将分节点合并转发合并为单节点转发（仍按字数上限自动分隔）
# 用于微信 OC 等不支持合并转发、会降级逐条发送且单周期消息条数有限的适配器
merge_forward_single_node: false

# 是否启用快捷发送
quick_send_enabled: true

# 快捷发送前缀。默认 >消息 发到当前 session，>{2} 消息 发到第 2 个 session；留空关闭快捷发送
quick_prefix: ">"

# 群聊快捷发送是否必须 @Bot 才响应
quick_group_at_bot_only: false

# 待审批提醒与忙时托管审批
remind_pending: true
remind_interval: 180
remind_max_count: 3
enable_poke_approve: true
auto_approve_enabled: false
auto_approve_start: "23:00"
auto_approve_end: "07:00"
max_reconnect_attempts: 30

# 是否随插件启动 SSE 监听
enable_sse: true

# 小功能
delay_yolo_mode: false