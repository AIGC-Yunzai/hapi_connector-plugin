<!DOCTYPE html>
<html lang="zh">

<head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8" />
    <link rel="shortcut icon" href="#" />
    <script src="{{_path}}/plugins/hapi_connector-plugin/resources/markdownPic/marked.min.js"></script>
    <link rel="stylesheet" href="{{_path}}/plugins/hapi_connector-plugin/resources/markdownPic/github.min.css">
    <script src="{{_path}}/plugins/hapi_connector-plugin/resources/markdownPic/highlight.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 24px;
            padding-bottom: 48px;
            width: 860px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #e6fffa 0%, #f0fff4 100%);
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 16px;
            padding: 26px 32px 20px;
            box-shadow: 0 6px 24px rgba(47, 133, 90, 0.12);
            border-top: 4px solid #2f855a;
            word-wrap: break-word;
            overflow-wrap: break-word;
            overflow: visible;
        }

        .markdown-content {
            font-size: 18px;
            line-height: 1.8;
            color: #1a202c;
            letter-spacing: 0.3px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            overflow: visible;
        }

        .markdown-content p {
            margin: 12px 0;
            line-height: 1.8;
        }

        .markdown-content code {
            font-family: "Consolas", "SpaceMono", monospace;
            background-color: #f6f8fa;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.92em;
            border: 1px solid #eaeef2;
            color: #c7254e;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .markdown-content pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 8px;
            overflow: visible;
            border: 1px solid #eaeef2;
            margin: 15px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 100%;
            line-height: 1.5;
        }

        .markdown-content pre code {
            color: #1a202c;
            padding: 0;
            background: none;
            border: none;
            display: block;
            white-space: pre-wrap;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            color: #2f855a;
            margin-top: 22px;
            margin-bottom: 14px;
            font-weight: 700;
            line-height: 1.25;
        }

        .markdown-content h1 { font-size: 1.9em; }
        .markdown-content h2 { font-size: 1.6em; }
        .markdown-content h3 { font-size: 1.4em; }
        .markdown-content h4 { font-size: 1.2em; }

        .markdown-content a {
            color: #2b6cb0;
            text-decoration: none;
            border-bottom: 1px solid #2b6cb0;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .markdown-content table {
            width: 100%;
            max-width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .markdown-content th,
        .markdown-content td {
            padding: 10px 12px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .markdown-content th {
            background: #2f855a;
            color: white;
            font-weight: 600;
        }

        .markdown-content tr:nth-child(even) {
            background: #f0fff4;
        }

        .markdown-content blockquote {
            margin: 12px 0;
            padding: 10px 18px;
            border-left: 4px solid #2f855a;
            background: #f0fff4;
            border-radius: 0 8px 8px 0;
            color: #2d3748;
        }

        .markdown-content ul,
        .markdown-content ol {
            padding-left: 22px;
        }

        .markdown-content li {
            margin: 5px 0;
        }

        .markdown-content hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, #2f855a, #9ae6b4);
            margin: 22px 0;
        }

        .cute-girl {
            position: absolute;
            right: 4px;
            bottom: 6px;
            width: 140px;
            height: auto;
            z-index: 0;
            pointer-events: none;
            opacity: 0.22;
        }

        .powered-by {
            margin: 16px auto 0;
            width: fit-content;
            font-size: 12px;
            font-style: italic;
            letter-spacing: 1.2px;
            text-align: center;
            padding: 4px 16px;
            color: #fff;
            background: linear-gradient(to right, #2f855a, #48bb78);
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(47, 133, 90, 0.2);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="markdown-content">{{content}}</div>
        <img class="cute-girl" src="{{_path}}/plugins/hapi_connector-plugin/resources/readme/girl.webp" alt="girl">
    </div>
    <div class="powered-by">Powered By HAPI Connector</div>

    <script>
        marked.setOptions({
            renderer: new marked.Renderer(),
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-',
            pedantic: false,
            gfm: true,
            breaks: true,
            sanitize: false,
            smartypants: false,
            xhtml: false
        });

        document.querySelectorAll('.markdown-content').forEach(element => {
            element.innerHTML = marked.parse(element.textContent);
        });
    </script>
</body>

</html>
